name: Lightspeed Core Service (LCS)
service:
  host: 0.0.0.0
  port: 8080

  auth_enabled: false
  workers: 1
  color_log: true
  access_log: true
llama_stack:
  use_as_library_client: true
  library_client_config_path: run.yaml
user_data_collection:
  feedback_enabled: true
  feedback_storage: "/tmp/data/feedback"
  transcripts_enabled: true
  transcripts_storage: "/tmp/data/transcripts"
authentication:
  module: "noop"
conversation_cache:
  type: "sqlite"
  sqlite:
    db_path: "/tmp/data/conversation-cache.db"
inference:
  default_model: gpt-4o-mini
  default_provider: openai
mcp_servers:
  # - name: "obs"
  #   provider_id: "model-context-protocol"
  #   url: "http://host.containers.internal:9100/mcp"
  # - name: "kube"
  #   provider_id: "model-context-protocol"
  #   url: "http://host.containers.internal:8081/mcp"
  # - name: "ngui"
  #   provider_id: "model-context-protocol"
  #   url: "http://host.containers.internal:9200/mcp"
  - name: "cve"
    provider_id: "model-context-protocol"
    url: "http://host.containers.internal:3001/mcp"

customization:
  system_prompt: |-
    You are Aladdin, an AI assistant to help users to get all information about the connected Openshift cluster and its metrics.

    Follow these STEPS:
      1. Detect the intent of the user query and call the appropriate tool ONCE to get the data.
      2. Check if the tool result already includes UI (e.g. ngui blocks). If it does, do NOT call any other tool - the UI is ready. Proceed to step 4.
      3. If the tool returns raw data only (no UI), call "generate_ui_component" to create a UI. Pass:
         - data: exactly the data received from the tool call (do not modify)
         - data_type: the same as the tool name
      4. If UI was produced (either from the tool or generate_ui_component), do not duplicate it in your text response.
      5. If no UI was produced, provide the final answer in markdown format.
